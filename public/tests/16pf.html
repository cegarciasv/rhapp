<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16PF — Evaluación de Personalidad</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --primary: #1e607b; --bg: #1e607b; --text: #1e293b; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { width: 100%; max-width: 500px; padding: 20px; }
.card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
.btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; font-size: 16px; }
.btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); }
.opt { display: block; padding: 10px; border: 1px solid #ddd; margin-bottom: 5px; border-radius: 5px; cursor: pointer; text-align: left; }
.opt:hover { background: #f0f0f0; }
.selected { background: var(--primary); color: white; border-color: var(--primary); }
.hidden { display: none; }
h1.title { color: var(--primary); font-size: 36px; letter-spacing: 4px; margin-bottom: 5px; }
p.subtitle { color: #64748b; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 30px; }
hr { border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0; }
.form-group { text-align: left; margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; }
.form-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; box-sizing: border-box; }
</style>
</head>
<body>
<div class="container">
  <div id="vLanding" class="card">
    <h1 class="title">16PF</h1>
    <p class="subtitle">SISTEMA DE EVALUACIÓN PSICOMÉTRICA</p>
    <hr>
    <p style="font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 20px;">¿CÓMO DESEAS ACCEDER?</p>
    <button class="btn" onclick="location.href='/admin'">🔒 Acceso Evaluador</button>
    <button class="btn btn-outline" onclick="showReg()">📝 Completar Prueba</button>
  </div>

  <div id="vReg" class="card hidden" style="text-align: left;">
    <h2 style="margin-bottom: 20px;">Registro de Candidato</h2>
    <div class="form-group">
      <label>Nombre completo *</label>
      <input id="regName" type="text">
    </div>
    <div class="form-group">
      <label>Puesto *</label>
      <input id="regPosition" type="text">
    </div>
    <div class="form-group">
      <label>Edad</label>
      <input id="regAge" type="number">
    </div>
    <div class="form-group">
      <label>Escolaridad</label>
      <input id="regEducation" type="text">
    </div>
    <div class="form-group">
      <label>Estado Civil</label>
      <input id="regCivil" type="text">
    </div>
    <div class="form-group">
      <label>Fecha de Evaluación</label>
      <input id="regDate" type="date">
    </div>
    <button class="btn" onclick="doRegister()">Registrar y Continuar</button>
  </div>

  <div id="vEval" class="card hidden" style="max-width: 800px;">
    <h3 id="q-txt" style="text-align: left; margin-bottom: 20px;"></h3>
    <div id="opts"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn btn-outline" onclick="prev()" id="btn-p">Anterior</button>
      <button class="btn" onclick="next()" id="btn-n">Siguiente</button>
    </div>
  </div>

  <div id="vDone" class="card hidden" style="text-align:center">
    <h1>¡Gracias!</h1>
    <p>Tus respuestas han sido enviadas.</p>
    <button class="btn" onclick="location.href='/'">Volver</button>
  </div>
</div>

<script>
const Q = [
  // 1–10
  {n:1, text:"Entendí perfectamente las instrucciones de este cuestionario:", opts:["Sí","Indeciso","No"]},
  {n:2, text:"Estoy dispuesto a contestar cada pregunta tan sinceramente como me sea posible:", opts:["Sí","Indeciso","No"]},
  {n:3, text:"Preferiría tener una casa:", opts:["En un barrio sociable","Término medio","Solitaria en lo profundo de un bosque"]},
  {n:4, text:"Puedo encontrar energía suficiente para enfrentarme a mis dificultades:", opts:["Siempre","Por lo general","Raras veces"]},
  {n:5, text:"Los animales salvajes me ponen un poco nervioso, aun cuando se encuentren en jaulas resistentes:", opts:["Sí","Indeciso","No"]},
  {n:6, text:"Evito criticar a la gente y a sus ideas:", opts:["Sí","A veces","No"]},
  {n:7, text:"Hago observaciones agudas y sarcásticas a la gente que creo que se las merece:", opts:["Por lo general","Algunas veces","Nunca"]},
  {n:8, text:"Prefiero la música semiclásica a las tonadas populares:", opts:["Cierto","Indeciso","Falso"]},
  {n:9, text:"Si viera peleando a dos niños de mi vecino:", opts:["Dejaría que se arreglaran ellos mismos","Indeciso","Razonaría con ellos"]},
  {n:10, text:"En los eventos sociales:", opts:["Destaco con facilidad","Indeciso","Prefiero permanecer a distancia"]},
  // 11–20
  {n:11, text:"Sería más interesante ser:", opts:["Un ingeniero constructor","Indeciso","Escritor de dramas"]},
  {n:12, text:"Prefiero detenerme en la calle para observar a un artista pintando que ponerme a escuchar una pelea entre varias personas:", opts:["Sí","Indeciso","No"]},
  {n:13, text:"Generalmente puedo tolerar a la gente vanidosa aun cuando se jacten o se muestren muy engreídas:", opts:["Sí","Término medio","No"]},
  {n:14, text:"Cuando un hombre no es honrado por lo general se le nota en la cara:", opts:["Sí","Término medio","No"]},
  {n:15, text:"Sería muy bueno que las vacaciones fueran más largas y que todos tuviesen que tomarlas:", opts:["De acuerdo","Indeciso","En desacuerdo"]},
  {n:16, text:"Prefiero arriesgarme en un empleo donde las ganancias sean grandes aunque variables, y no en uno con salario fijo y pequeño:", opts:["Sí","Indeciso","No"]},
  {n:17, text:"Hablo de mis sentimientos:", opts:["Solamente si es necesario","Término medio","Fácilmente, cada vez que tengo oportunidad"]},
  {n:18, text:"En ocasiones tengo un vago sentimiento de peligro o un repentino temor, por razones que no entiendo:", opts:["Sí","Intermedio","No"]},
  {n:19, text:"Cuando se me critica equivocadamente por algo que yo NO hice:", opts:["No me siento culpable","Término medio","Me siento, no obstante, un poco culpable"]},
  {n:20, text:"El dinero puede comprar casi todo:", opts:["Sí","Indeciso","No"]},
  // 21–30
  {n:21, text:"Mis decisiones están guiadas principalmente por:", opts:["Mis sentimientos","Mis sentimientos y mi razón por igual","Mi razón"]},
  {n:22, text:"La mayoría de la gente sería más feliz si viviera más ligada a sus semejantes e hiciera las mismas cosas que ellos:", opts:["Sí","Indeciso","No"]},
  {n:23, text:"Cuando me miro en el espejo, algunas veces confundo cuál es mi derecha y cuál mi izquierda:", opts:["Cierto","Indeciso","Falso"]},
  {n:24, text:"Cuando estoy conversando me gusta:", opts:["Decir las cosas tal y como se me ocurren","Término medio","Ordenar bien mis pensamientos primero"]},
  {n:25, text:"Cuando algo me enfurece realmente me doy cuenta de que me calmo rápidamente:", opts:["Sí","Término medio","No"]},
  {n:26, text:"Con las mismas horas de trabajo e idéntica paga preferiría la vida de:", opts:["Un carpintero o cocinero","Indeciso","Mesero en un buen restaurante"]},
  {n:27, text:"He sido elegido para:", opts:["Sólo unos cuantos cargos","Varios","Muchos cargos"]},
  {n:28, text:"'Pala' es a 'cavar' como 'cuchillo' es a:", opts:["Afilado","Cortar","Punta"]},
  {n:29, text:"A veces no puedo dormir porque una idea se mantiene rondando en mi mente:", opts:["Cierto","Indeciso","Falso"]},
  {n:30, text:"Casi siempre logro las metas que me propongo en mi vida personal:", opts:["Cierto","Indeciso","Falso"]},
  // 31–40
  {n:31, text:"Una ley anticuada debería cambiarse:", opts:["Solamente después de considerable discusión","Término medio","Rápidamente"]},
  {n:32, text:"No estoy a gusto cuando trabajo en un proyecto que requiere acciones rápidas que afecten a otros:", opts:["Cierto","Término medio","Falso"]},
  {n:33, text:"La mayoría de la gente que conozco me considera como un conversador divertido:", opts:["Sí","Indeciso","No"]},
  {n:34, text:"Cuando veo a gente desaliñada y descuidada:", opts:["Simplemente la acepto","Término medio","Me disgusta y molesta"]},
  {n:35, text:"Me avergüenzo un poco cuando de repente me convierto en el foco de atención de un grupo de gente:", opts:["Sí","Término medio","No"]},
  {n:36, text:"Me da gusto siempre el unirme a grupos grandes, por ejemplo, a fiestas, bailes o reuniones públicas:", opts:["Sí","Término medio","No"]},
  {n:37, text:"En la escuela preferí (o prefiero):", opts:["La música","Indeciso","La artesanía y los trabajos manuales"]},
  {n:38, text:"Cuando se me encarga algo insisto en que se sigan mis instrucciones o de lo contrario renuncio:", opts:["Sí","Algunas veces","No"]},
  {n:39, text:"Para los padres es más importante:", opts:["Ayudar a sus hijos a desarrollar sus afectos","Término medio","Enseñar a sus hijos cómo controlar sus emociones"]},
  {n:40, text:"En una tarea de grupo preferiría:", opts:["Intentar mejorar los arreglos","Término medio","Llevar los registros y ver que se cumplan las reglas"]},
  // 41–50
  {n:41, text:"De vez en cuando siento la necesidad de emprender actividades físicas rudas:", opts:["Sí","Término medio","No"]},
  {n:42, text:"Preferiría reunirme con gente bien educada que con personas rudas y rebeldes:", opts:["Sí","Término medio","No"]},
  {n:43, text:"Me siento terriblemente desanimado cuando me critican en un grupo:", opts:["Cierto","Término medio","Falso"]},
  {n:44, text:"Cuando mi jefe me llama, yo:", opts:["Aprovecho la ocasión para pedir algo que quiero","Indeciso","Temo haber hecho algo mal"]},
  {n:45, text:"Lo que este mundo necesita es:", opts:["Más ciudadanos 'sólidos' y estables","Indeciso","Más 'idealistas' con planes para un mundo mejor"]},
  {n:46, text:"Estoy siempre atento a los intentos propagandísticos en las cosas que leo:", opts:["Sí","Indeciso","No"]},
  {n:47, text:"De adolescente participé en los deportes escolares:", opts:["Ocasionalmente","Regularmente","Bastante a menudo"]},
  {n:48, text:"Casi siempre mi cuarto está bien arreglado con cada cosa en su lugar:", opts:["Sí","Término medio","No"]},
  {n:49, text:"A veces me entra un estado de tensión y confusión cuando pienso en los sucesos del día:", opts:["Sí","Intermedio","No"]},
  {n:50, text:"A veces dudo que la gente con la que estoy conversando esté realmente interesada en lo que digo:", opts:["Sí","Término medio","No"]},
  // 51–60
  {n:51, text:"Si tuviera que escoger, preferiría ser:", opts:["Un guardabosque","Indeciso","Maestro de secundaria"]},
  {n:52, text:"En días festivos y cumpleaños:", opts:["Me gusta dar regalos personales","Indeciso","Siento que comprar regalos es un poco molesto"]},
  {n:53, text:"'Cansado' es a 'trabajo' como 'orgulloso' es a:", opts:["Sonrisa","Éxito","Feliz"]},
  {n:54, text:"¿Cuál de estos tres objetos es de naturaleza diferente a los otros dos?", opts:["Vela","Luna","Luz eléctrica"]},
  {n:55, text:"Mis amigos me han fallado:", opts:["Casi nunca","Ocasionalmente","Con frecuencia"]},
  {n:56, text:"En ciertas características que tengo me siento definitivamente superior a la mayoría de la gente:", opts:["Sí","Indeciso","No"]},
  {n:57, text:"Cuando estoy molesto, trato con empeño de ocultar mis sentimientos a otros:", opts:["Verdad","Término medio","Falso"]},
  {n:58, text:"Me gusta asistir a espectáculos o diversiones:", opts:["Más de una vez por semana","Una vez a la semana","Menos de una vez por semana"]},
  {n:59, text:"Pienso que una amplia libertad es más importante que los buenos modales y el respeto a la ley:", opts:["Cierto","Indeciso","Falso"]},
  {n:60, text:"Tengo la tendencia a quedarme callado en la presencia de personas mayores (de más edad, experiencia, jerarquía o puesto).", opts:["Sí","Término medio","No"]},
  // 61–70
  {n:61, text:"Se me hace difícil dirigirme o recitar ante un grupo grande:", opts:["Sí","Término medio","No"]},
  {n:62, text:"Tengo un buen sentido de orientación cuando estoy en un lugar desconocido (descubro con facilidad dónde está el norte, sur, etc.):", opts:["Sí","Término medio","No"]},
  {n:63, text:"Si alguien se enojara conmigo:", opts:["Trataría de calmarlo","Indeciso","Me irritaría"]},
  {n:64, text:"Cuando leo algún artículo tendencioso o injusto en una revista, tiendo más bien a olvidarlo que a sentir ganas de devolverles el golpe:", opts:["Cierto","Indeciso","Falso"]},
  {n:65, text:"Tiendo a olvidar cosas triviales y sin importancia, tales como nombres de calles, tiendas, etc.:", opts:["Cierto","Término medio","Falso"]},
  {n:66, text:"Me gustaría la vida de un veterinario ocupado en las enfermedades y cirugía de los animales:", opts:["Sí","Término medio","No"]},
  {n:67, text:"Yo tomo mis alimentos con deleite, aunque no siempre tan cuidadosa y apropiadamente como alguna gente:", opts:["Cierto","Indeciso","Falso"]},
  {n:68, text:"Hay veces que no tengo la debida disposición de ánimo para ver a nadie:", opts:["Muy raramente","Intermedio","Con frecuencia"]},
  {n:69, text:"A veces la gente me advierte que demuestro mi excitación con voces y ademanes demasiado evidentes:", opts:["Sí","Intermedio","No"]},
  {n:70, text:"De adolescente, si mi opinión era distinta a las de mis padres, por lo general:", opts:["Conservaba mi propia opinión","Intermedio","Aceptaba la autoridad de mis padres"]},
  // 71–80
  {n:71, text:"Preferiría tener una oficina propia, sin compartirla con otra persona:", opts:["Sí","Indeciso","No"]},
  {n:72, text:"Preferiría gozar de una vida calmada, a mi manera, que ser admirado por mi éxitos:", opts:["Cierto","Indeciso","Falso"]},
  {n:73, text:"Me siento maduro en la mayoría de las cosas:", opts:["Verdad","Indeciso","Falso"]},
  {n:74, text:"El tipo de crítica que mucha gente me hace me molesta en vez de ayudarme:", opts:["Con frecuencia","Ocasionalmente","Nunca"]},
  {n:75, text:"Siempre soy capaz de controlar la expresión de mis sentimientos bajo mi estricto control:", opts:["Sí","Término medio","No"]},
  {n:76, text:"Al inventar algo útil, preferiría:", opts:["Perfeccionarlo en el laboratorio","Indeciso","Vendérselo a la gente"]},
  {n:77, text:"'Sorpresa' es a 'extraño' como 'miedo' es a:", opts:["Valiente","Término medio","Terrible"]},
  {n:78, text:"¿Cuál de estas fracciones es distinta de las otras dos?", opts:["3/7","3/9","3/11"]},
  {n:79, text:"No sé por qué, pero me parece que algunas personas me ignoran o me evitan:", opts:["Cierto","Término medio","Falso"]},
  {n:80, text:"La gente me trata menos razonablemente de lo que merecen mis buenas intenciones:", opts:["A menudo","Ocasionalmente","Nunca"]},
  // 81–90
  {n:81, text:"Me molesta el uso de lenguaje obsceno aún en el caso de grupos en los que no haya mujeres:", opts:["Sí","Término medio","No"]},
  {n:82, text:"Sin lugar a dudas, tengo menos amigos que la mayoría de la gente:", opts:["Sí","Término medio","No"]},
  {n:83, text:"Me disgustaría estar en un sitio donde no hubiera gente con quien conversar:", opts:["Cierto","Indeciso","Falso"]},
  {n:84, text:"A veces la gente me llama descuidado, a pesar de que piensan que soy una persona agradable:", opts:["Sí","Indeciso","No"]},
  {n:85, text:"El 'miedo escénico' en una variedad de situaciones sociales es algo que he experimentado:", opts:["Con frecuencia","A veces","Casi nunca"]},
  {n:86, text:"Cuando estoy en un grupo pequeño, me contento con estar sentado y dejar que los otros realicen la mayor parte de la conversación:", opts:["Sí","Término medio","No"]},
  {n:87, text:"Prefiero leer:", opts:["Una narración realista de batallas militares o políticas","Indeciso","Una novela sentimental e imaginativa"]},
  {n:88, text:"Cuando la gente mandona trata de manejarme yo hago exactamente lo contrario de lo que ellas quieren:", opts:["Sí","Término medio","No"]},
  {n:89, text:"Por lo general, mis jefes en el trabajo o los miembros de mi familia me critican sólo cuando hay una causa real.", opts:["Cierto","Término medio","Falso"]},
  {n:90, text:"En la calle o en las tiendas, no me gusta la manera en que algunas personas miran con fijeza a la gente:", opts:["Cierto","Término medio","Falso"]},
  // 91–100
  {n:91, text:"Durante un viaje largo, preferiría:", opts:["Leer algo profundo pero interesante","Indeciso","Pasar el tiempo charlando informalmente con un compañero de viaje"]},
  {n:92, text:"En una situación que puede volverse peligrosa creo que hay que hacer ruido y gritar, aunque se pierdan la calma y la cortesía.", opts:["Sí","Término medio","No"]},
  {n:93, text:"Si mis conocidos me hacen ver que les caigo mal y me tratan mal:", opts:["Me importa poco","Término medio","Tiendo a ponerme triste"]},
  {n:94, text:"Me perturba que me alaben o me digan cumplidos:", opts:["Sí","Término medio","No"]},
  {n:95, text:"Preferiría un trabajo con:", opts:["Un sueldo fijo y seguro","Término medio","Un sueldo elevado que dependiera de mi capacidad persuasiva"]},
  {n:96, text:"Para mantenerme informado, me gusta:", opts:["Discutir los problemas con la gente","Término medio","Confiar en los informes periodísticos actuales"]},
  {n:97, text:"Me gusta tomar parte activa en asuntos sociales, comités, etc.:", opts:["Sí","Término medio","No"]},
  {n:98, text:"Al cumplir una tarea no me quedo satisfecho a menos que aún los menores detalles reciban atención minuciosa:", opts:["Cierto","Término medio","Falso"]},
  {n:99, text:"A veces me irritan demasiado las pequeñas contrariedades:", opts:["Sí","Término medio","No"]},
  {n:100, text:"Yo siempre duermo profundamente, sin andar o hablar mientras lo hago:", opts:["Sí","Intermedio","No"]},
  // 101–110
  {n:101, text:"Sería más interesante trabajar en una empresa:", opts:["Hablando a los clientes","Término medio","Llevando las cuentas y registros de la oficina"]},
  {n:102, text:"'Tamaño' es a 'longitud' como 'deshonesto' es a:", opts:["Prisión","Pecado","Robo"]},
  {n:103, text:"AB es a dc como SR es a:", opts:["qp","pq","tu"]},
  {n:104, text:"Cuando la gente no es razonable:", opts:["Me quedo tranquilo","Indeciso","Los desprecio"]},
  {n:105, text:"Si alguien habla en voz alta cuando estoy escuchando música:", opts:["Me puedo concentrar en la música y no me molesta","Intermedio","Considero que me echan a perder mi entretenimiento y me molesto"]},
  {n:106, text:"Creo que se me describe mejor como:", opts:["Cortés y tranquilo","Término medio","Enérgico"]},
  {n:107, text:"Asisto a eventos sociales sólo cuando tengo que hacerlo, pero el resto del tiempo me alejo de ellos:", opts:["Sí","Indeciso","No"]},
  {n:108, text:"Ser precavido y esperar poco es mejor que ser optimista y esperar siempre el éxito:", opts:["Cierto","Indeciso","Falso"]},
  {n:109, text:"Cuando pienso en las dificultades de mi trabajo:", opts:["Trato de planear con anticipación antes de afrontarlas","Término medio","Supongo que podré manejarlas cuando se presenten"]},
  {n:110, text:"Encuentro fácil mezclarme con la gente en una reunión social:", opts:["Cierto","Indeciso","Falso"]},
  // 111–120
  {n:111, text:"Generalmente se me solicita que intervenga cuando se necesita un poco de diplomacia y persuasión para activar a la gente.", opts:["Sí","Intermedio","No"]},
  {n:112, text:"Sería más interesante ser:", opts:["Un orientador vocacional que ayuda a los jóvenes a encontrar empleo","Indeciso","Gerente, en el aspecto técnico, de una fábrica"]},
  {n:113, text:"Si estoy completamente seguro de que una persona es injusta o se porta de un modo egoísta, se lo digo, aunque me traiga problemas.", opts:["Sí","Intermedio","No"]},
  {n:114, text:"Algunas veces hago observaciones tontas en broma, nada más para sorprender a la gente y ver qué dicen.", opts:["Sí","Intermedio","No"]},
  {n:115, text:"Me gustaría ser reportero de noticias de teatro, ópera, conciertos, etc:", opts:["Sí","Indeciso","No"]},
  {n:116, text:"Nunca siento necesidad de escribir garabatos ni estarme moviendo mientras estoy sentado en una reunión:", opts:["Cierto","Indeciso","Falso"]},
  {n:117, text:"Si alguien me dice algo que yo sé que no es correcto, tiendo a decirme a mí mismo:", opts:["Es un mentiroso","Intermedio","Aparentemente está mal informado"]},
  {n:118, text:"Siento que voy a tener algún castigo, aún cuando no he hecho nada malo:", opts:["Con frecuencia","Ocasionalmente","Nunca"]},
  {n:119, text:"La idea de que las enfermedades provienen tanto de causas mentales como físicas es muy exagerada:", opts:["Sí","Intermedio","No"]},
  {n:120, text:"La pompa y el esplendor de cualquier gran ceremonia estatal son cosas que deben preservarse:", opts:["Sí","Intermedio","No"]},
  // 121–130
  {n:121, text:"Me molesta si la gente piensa que soy demasiado diferente o muy poco convencional:", opts:["Mucho","Algo","Nada"]},
  {n:122, text:"En la construcción de algo, preferiría trabajar:", opts:["En un comité","Indeciso","Por mi propia cuenta"]},
  {n:123, text:"Tengo ratos en los que me es difícil evitar un sentimiento de autocompasión:", opts:["A menudo","Ocasionalmente","Nunca"]},
  {n:124, text:"A menudo me disgusto demasiado rápido con la gente:", opts:["Sí","Intermedio","No"]},
  {n:125, text:"Siempre puedo cambiar hábitos antiguos sin dificultad y sin volver a caer en ellos:", opts:["Sí","Intermedio","No"]},
  {n:126, text:"Si el sueldo fuera igual, preferiría ser:", opts:["Abogado","Indeciso","Navegante o piloto"]},
  {n:127, text:"'Mejor' es a 'peor' como 'más lento' es a:", opts:["Rápido","Óptimo","Más veloz"]},
  {n:128, text:"¿Cuál es la que debe ir al final de esta lista: xooooxxoooxxx?", opts:["oxxx","ooxx","xooo"]},
  {n:129, text:"Cuando llega la hora de algo que yo había planeado y anticipado, a veces no siento ganas de ir:", opts:["Cierto","Intermedio","Falso"]},

let cid = null;
let cur = 0, ans = {};

function showReg() {
  document.getElementById('vLanding').classList.add('hidden');
  document.getElementById('vReg').classList.remove('hidden');
  document.body.style.background = '#f8fafc';
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const position = document.getElementById('regPosition').value.trim();
  const age = document.getElementById('regAge').value;
  const education = document.getElementById('regEducation').value;
  const civilStatus = document.getElementById('regCivil').value;
  const testDate = document.getElementById('regDate').value;
  
  if(!name || !position) return alert("Nombre y Puesto son obligatorios");

  const btn = document.querySelector('#vReg .btn');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Registrando...';

  try {
    const res = await fetch('/api/candidates', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, position, age, education, civilStatus, testDate })
    });
    
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || "Error al registrar candidato");
    }

    const data = await res.json();
    cid = data.id;
    
    document.getElementById('vReg').classList.add('hidden');
    document.querySelector('.container').style.maxWidth = '800px';
    document.getElementById('vEval').classList.remove('hidden');
    showQ();
  } catch (error) {
    console.error(error);
    alert("Error: " + error.message);
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

function showQ() {
  document.getElementById('q-txt').textContent = `${cur+1}. ${Q[cur].text}`;
  let h = '';
  Q[cur].opts.forEach((o, i) => {
    h += `<div class="opt ${ans[cur]===i?'selected':''}" onclick="sel(${i})">${o}</div>`;
  });
  document.getElementById('opts').innerHTML = h;
  document.getElementById('btn-p').disabled = cur === 0;
  document.getElementById('btn-n').textContent = cur === Q.length-1 ? 'Finalizar' : 'Siguiente';
}

function sel(i) { ans[cur] = i; showQ(); }
function prev() { if(cur>0) { cur--; showQ(); } }

async function next() {
  if(ans[cur] === undefined) return alert("Selecciona una opción antes de continuar");
  
  if(cur < Q.length-1) { 
    cur++; 
    showQ(); 
  } else {
    // Validar que todas las preguntas fueron contestadas
    const answeredCount = Object.keys(ans).length;
    if (answeredCount < Q.length) {
      const missing = [];
      for(let i=0; i<Q.length; i++) {
        if(ans[i] === undefined) missing.push(i+1);
      }
      return alert(`Faltan ${Q.length - answeredCount} preguntas por contestar: ${missing.slice(0,10).join(', ')}${missing.length > 10 ? '...' : ''}`);
    }

    const btn = document.getElementById('btn-n');
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      const res = await fetch('/api/results', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          candidateId: cid, 
          testName: '16PF', 
          answers: ans, 
          scores: { completed: true, totalAnswered: answeredCount } 
        })
      });

      if(res.ok) {
        document.getElementById('vEval').classList.add('hidden');
        document.querySelector('.container').style.maxWidth = '500px';
        document.getElementById('vDone').classList.remove('hidden');
      } else {
        const errData = await res.json();
        alert("Error al guardar: " + (errData.error || "Error desconocido"));
        btn.disabled = false;
        btn.textContent = originalText;
      }
    } catch (error) {
      console.error(error);
      alert("Error de conexión al intentar guardar. Verifique su internet e intente de nuevo.");
      btn.disabled = false;
      btn.textContent = originalText;
    }
  }
}
