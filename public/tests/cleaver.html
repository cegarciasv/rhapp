<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLEAVER | Evaluación de Comportamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --primary: #1e607b; --bg: #1e607b; --text: #1e293b; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { width: 100%; max-width: 500px; padding: 20px; }
.card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
.btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; font-size: 16px; }
.btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; text-align: left; }
.header { font-weight: 800; text-transform: uppercase; font-size: 12px; color: #64748b; }
.row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f1f5f9; text-align: left; align-items: center; }
.opt-btn { border: 1px solid #e2e8f0; padding: 8px; border-radius: 6px; cursor: pointer; text-align: center; }
.opt-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.hidden { display: none; }
h1.title { color: var(--primary); font-size: 36px; letter-spacing: 4px; margin-bottom: 5px; }
p.subtitle { color: #64748b; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 30px; }
hr { border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0; }
.form-group { text-align: left; margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; }
.form-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; box-sizing: border-box; }
</style>
</head>
<body>
<div class="container">
  <div id="vLanding" class="card">
    <h1 class="title">CLEAVER</h1>
    <p class="subtitle">SISTEMA DE EVALUACIÓN PSICOMÉTRICA</p>
    <hr>
    <p style="font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 20px;">¿CÓMO DESEAS ACCEDER?</p>
    <button class="btn" onclick="location.href='/admin'">🔒 Acceso Evaluador</button>
    <button class="btn btn-outline" onclick="showReg()">📝 Completar Prueba</button>
  </div>

  <div id="vReg" class="card hidden" style="text-align: left;">
    <h2 style="margin-bottom: 20px;">Registro de Candidato</h2>
    <div class="form-group">
      <label>Nombre completo *</label>
      <input id="regName" type="text">
    </div>
    <div class="form-group">
      <label>Puesto *</label>
      <input id="regPosition" type="text">
    </div>
    <div class="form-group">
      <label>Edad</label>
      <input id="regAge" type="number">
    </div>
    <div class="form-group">
      <label>Escolaridad</label>
      <input id="regEducation" type="text">
    </div>
    <div class="form-group">
      <label>Estado Civil</label>
      <input id="regCivil" type="text">
    </div>
    <div class="form-group">
      <label>Fecha de Evaluación</label>
      <input id="regDate" type="date">
    </div>
    <button class="btn" onclick="doRegister()">Registrar y Continuar</button>
  </div>

  <div id="vEval" class="card hidden" style="max-width: 800px;">
    <div class="grid">
      <div class="header">Palabra</div>
      <div class="header" style="text-align:center">Más (+)</div>
      <div class="header" style="text-align:center">Menos (-)</div>
    </div>
    <div id="questions"></div>
    <button id="btn-next" class="btn" onclick="next()" style="margin-top:20px">Siguiente Grupo</button>
  </div>

  <div id="vDone" class="card hidden" style="text-align:center">
    <h1>¡Prueba Terminada!</h1>
    <p>Los datos se han guardado correctamente.</p>
    <button class="btn" onclick="location.href='/'">Finalizar</button>
  </div>
</div>

<script>
const GROUPS = [
  {words:[{w:'Persuasivo',f:'I'},{w:'Gentil',f:'S'},{w:'Humilde',f:'C'},{w:'Original',f:'D'}]},
  {words:[{w:'Agresivo',f:'D'},{w:'Alma de la fiesta',f:'I'},{w:'Comodino',f:'S'},{w:'Temeroso',f:'C'}]},
  {words:[{w:'Agradable',f:'S'},{w:'Temeroso de Dios',f:'C'},{w:'Tenaz',f:'D'},{w:'Atractivo',f:'I'}]},
  {words:[{w:'Cauteloso',f:'C'},{w:'Determinado',f:'D'},{w:'Convincente',f:'I'},{w:'Bonachón',f:'S'}]},
  {words:[{w:'Dócil',f:'C'},{w:'Atrevido',f:'D'},{w:'Leal',f:'S'},{w:'Encantador',f:'I'}]},
  {words:[{w:'Dispuesto',f:'S'},{w:'Deseoso',f:'D'},{w:'Consecuente',f:'C'},{w:'Entusiasta',f:'I'}]},
  {words:[{w:'Fuerza de voluntad',f:'D'},{w:'Mente abierta',f:'C'},{w:'Complaciente',f:'S'},{w:'Animoso',f:'I'}]},
  {words:[{w:'Confiado',f:'I'},{w:'Simpatizador',f:'S'},{w:'Tolerante',f:'C'},{w:'Afirmativo',f:'D'}]},
  {words:[{w:'Ecuánime',f:'S'},{w:'Preciso',f:'C'},{w:'Nervioso',f:'D'},{w:'Jovial',f:'I'}]},
  {words:[{w:'Disciplinado',f:'C'},{w:'Generoso',f:'I'},{w:'Animoso',f:'D'},{w:'Persistente',f:'S'}]},
  {words:[{w:'Competitivo',f:'D'},{w:'Alegre',f:'I'},{w:'Considerado',f:'S'},{w:'Armonioso',f:'C'}]},
  {words:[{w:'Admirable',f:'I'},{w:'Bondadoso',f:'S'},{w:'Resignado',f:'C'},{w:'Carácter firme',f:'D'}]},
  {words:[{w:'Obediente',f:'S'},{w:'Quisquilloso',f:'C'},{w:'Inconquistable',f:'D'},{w:'Juguetón',f:'I'}]},
  {words:[{w:'Respetuoso',f:'C'},{w:'Emprendedor',f:'D'},{w:'Optimista',f:'I'},{w:'Servicial',f:'S'}]},
  {words:[{w:'Valiente',f:'D'},{w:'Inspirador',f:'I'},{w:'Sumiso',f:'S'},{w:'Tímido',f:'C'}]},
  {words:[{w:'Adaptable',f:'C'},{w:'Disputador',f:'D'},{w:'Indiferente',f:'S'},{w:'Sangre liviana',f:'I'}]},
  {words:[{w:'Amiguero',f:'I'},{w:'Paciente',f:'S'},{w:'Confianza en sí mismo',f:'D'},{w:'Mesurado para hablar',f:'C'}]},
  {words:[{w:'Conforme',f:'S'},{w:'Confiable',f:'I'},{w:'Pacífico',f:'C'},{w:'Positivo',f:'D'}]},
  {words:[{w:'Aventurero',f:'D'},{w:'Receptivo',f:'I'},{w:'Cordial',f:'S'},{w:'Moderado',f:'C'}]},
  {words:[{w:'Indulgente',f:'S'},{w:'Esteta',f:'I'},{w:'Vigoroso',f:'D'},{w:'Sociable',f:'C'}]},
  {words:[{w:'Parlanchín',f:'I'},{w:'Controlado',f:'C'},{w:'Convencional',f:'S'},{w:'Decisivo',f:'D'}]},
  {words:[{w:'Cohibido',f:'C'},{w:'Exacto',f:'S'},{w:'Franco',f:'D'},{w:'Buen compañero',f:'I'}]},
  {words:[{w:'Diplomático',f:'C'},{w:'Audaz',f:'D'},{w:'Refinado',f:'I'},{w:'Satisfecho',f:'S'}]},
  {words:[{w:'Inquieto',f:'D'},{w:'Popular',f:'I'},{w:'Buen vecino',f:'S'},{w:'Devoto',f:'C'}]}
];

function scoreTest(answers) {
  const M = {D:0, I:0, S:0, C:0};
  const L = {D:0, I:0, S:0, C:0};
  for (let g = 0; g < 24; g++) {
    const ans = answers[g];
    if (!ans) continue;
    const gData = GROUPS[g].words;
    if (ans.plus !== null) {
      const f = gData[ans.plus].f;
      M[f] = (M[f] || 0) + 1;
    }
    if (ans.minus !== null) {
      const f = gData[ans.minus].f;
      L[f] = (L[f] || 0) + 1;
    }
  }
  const T = {
    D: M.D - L.D,
    I: M.I - L.I,
    S: M.S - L.S,
    C: M.C - L.C
  };
  return { M, L, T };
}

let cid = null;
let cur = 0, ans = {};

function showReg() {
  document.getElementById('vLanding').classList.add('hidden');
  document.getElementById('vReg').classList.remove('hidden');
  document.body.style.background = '#f8fafc';
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const position = document.getElementById('regPosition').value.trim();
  const age = document.getElementById('regAge').value;
  const education = document.getElementById('regEducation').value;
  const civilStatus = document.getElementById('regCivil').value;
  const testDate = document.getElementById('regDate').value;
  
  if(!name || !position) return alert("Nombre y Puesto son obligatorios");

  const btn = document.querySelector('#vReg .btn');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Registrando...';

  try {
    const res = await fetch('/api/candidates', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, position, age, education, civilStatus, testDate })
    });
    
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || "Error al registrar candidato");
    }

    const data = await res.json();
    cid = data.id;
    
    document.getElementById('vReg').classList.add('hidden');
    document.querySelector('.container').style.maxWidth = '800px';
    document.getElementById('vEval').classList.remove('hidden');
    showGroup();
  } catch (error) {
    console.error(error);
    alert("Error: " + error.message);
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

function showGroup() {
  const g = GROUPS[cur];
  let h = '';
  g.words.forEach((wObj, i) => {
    h += `<div class="row">
      <div>${wObj.w}</div>
      <div class="opt-btn ${ans[cur]?.plus===i?'active':''}" onclick="sel(${i},'plus')">+</div>
      <div class="opt-btn ${ans[cur]?.minus===i?'active':''}" onclick="sel(${i},'minus')">-</div>
    </div>`;
  });
  document.getElementById('questions').innerHTML = h;
  document.getElementById('btn-next').textContent = cur === GROUPS.length - 1 ? 'Finalizar Prueba' : 'Siguiente Grupo';
}

function sel(i, type) {
  if(!ans[cur]) ans[cur] = {plus:null, minus:null};
  if(type === 'plus' && ans[cur].minus === i) ans[cur].minus = null;
  if(type === 'minus' && ans[cur].plus === i) ans[cur].plus = null;
  ans[cur][type] = i;
  showGroup();
}

async function next() {
  if(!ans[cur] || ans[cur].plus === null || ans[cur].minus === null) return alert("Seleccione un + y un - antes de continuar");
  
  if(cur < GROUPS.length - 1) { 
    cur++; 
    showGroup(); 
  } else {
    // Validar que todos los grupos fueron contestados
    const answeredCount = Object.keys(ans).length;
    if (answeredCount < GROUPS.length) {
      return alert("Faltan grupos por contestar.");
    }

    const btn = document.getElementById('btn-next');
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    const scores = scoreTest(ans);

    try {
      const res = await fetch('/api/results', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ 
          candidateId: cid, 
          testName: 'CLEAVER', 
          answers: ans, 
          scores: { ...scores, completed: true } 
        })
      });
      if(res.ok) {
        document.getElementById('vEval').classList.add('hidden');
        document.querySelector('.container').style.maxWidth = '500px';
        document.getElementById('vDone').classList.remove('hidden');
      } else {
        const errData = await res.json();
        alert("Error al guardar: " + (errData.error || "Error desconocido"));
        btn.disabled = false;
        btn.textContent = originalText;
      }
    } catch (e) {
      console.error(e);
      alert("Error de conexión al intentar guardar.");
      btn.disabled = false;
      btn.textContent = originalText;
    }
  }
}
</script>
</body>
</html>
